<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>AgroMind | Reset Password</title>
  <link rel="icon" type="image/png" href="images/favicon.png?v=2">
  <link rel="stylesheet" href="styles.css?v=3">
</head>
<body class="auth-container">
  <div class="auth-form fade-in">
    <div class="h1" style="text-align:center;margin-bottom:8px">AgroMind</div>
    <div class="small" style="text-align:center;margin-bottom:32px">Create a secure new password for your account.</div>

    <h3 style="margin-bottom:24px">Set New Password</h3>

    <div style="margin-bottom:20px">
      <label class="label">New Password</label>
      <input id="newPassword" class="input" type="password" placeholder="At least 6 characters" style="margin-bottom:0">
    </div>

    <div style="margin-bottom:24px">
      <label class="label">Confirm New Password</label>
      <input id="confirmPassword" class="input" type="password" placeholder="Re-enter password" style="margin-bottom:0">
    </div>

    <div id="statusMessage" style="display:none;margin-bottom:20px" class="result-success"></div>
    <div id="errorMessage" style="display:none;margin-bottom:20px" class="result-error"></div>

    <button id="updateBtn" class="btn" style="width:100%">Update Password</button>

    <div style="margin-top:24px;text-align:center">
      <a href="login.html" class="small" style="text-decoration:none">Back to login</a>
    </div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const email = urlParams.get('email');
    const token = urlParams.get('token');

    function showStatus(msg, isError = false) {
      const successEl = document.getElementById('statusMessage');
      const errorEl = document.getElementById('errorMessage');
      
      successEl.style.display = 'none';
      errorEl.style.display = 'none';

      if (isError) {
        errorEl.textContent = msg;
        errorEl.style.display = 'block';
      } else {
        successEl.textContent = msg;
        successEl.style.display = 'block';
      }
    }

    if (!email || !token) {
        showStatus('Invalid or missing reset link. Please request a new one.', true);
        document.getElementById('updateBtn').disabled = true;
    }

    document.getElementById('updateBtn').addEventListener('click', async () => {
      const p1 = document.getElementById('newPassword').value;
      const p2 = document.getElementById('confirmPassword').value;

      if (!p1 || p1.length < 6) { showStatus('Password must be at least 6 characters.', true); return; }
      if (p1 !== p2) { showStatus('Passwords do not match.', true); return; }

      const btn = document.getElementById('updateBtn');
      btn.disabled = true;
      btn.textContent = 'Updating...';

      try {
        const res = await fetch('/api/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, token, newPassword: p1 })
        });
        const data = await res.json();

        if (!res.ok) throw new Error(data.error || 'Failed to update password');

        showStatus('Password updated successfully! You can now log in.');
        setTimeout(() => { window.location = 'login.html'; }, 2000);

      } catch (err) {
        showStatus(err.message, true);
        btn.disabled = false;
        btn.textContent = 'Update Password';
      }
    });
  </script>
</body>
</html>
