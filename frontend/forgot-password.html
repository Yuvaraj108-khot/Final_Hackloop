<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>AgroMind | Forgot Password</title>
  <link rel="icon" type="image/png" href="images/favicon.png?v=2">
  <link rel="stylesheet" href="styles.css?v=3">
</head>
<body class="auth-container">
  <div class="auth-form fade-in">
    <div class="h1" style="text-align:center;margin-bottom:8px">AgroMind</div>
    <div class="small" style="text-align:center;margin-bottom:32px">Reset your password to get back to farming.</div>

    <h3 style="margin-bottom:24px">Forgot Password?</h3>
    <p class="small" style="margin-bottom:24px; color:var(--text-secondary)">Enter your email address and we'll send you a link to reset your password.</p>

    <div style="margin-bottom:20px">
      <label class="label">Email Address</label>
      <input id="email" class="input" type="email" placeholder=" farmer@example.com" style="margin-bottom:0">
    </div>

    <div id="statusMessage" style="display:none;margin-bottom:20px" class="result-success"></div>
    <div id="errorMessage" style="display:none;margin-bottom:20px" class="result-error"></div>

    <button id="resetBtn" class="btn" style="width:100%">Send Reset Link</button>

    <div style="margin-top:24px;text-align:center">
      <a href="login.html" class="small" style="text-decoration:none">← Back to login</a>
    </div>

    <div id="demoLink" style="display:none; margin-top:20px; padding:15px; background:rgba(0,0,0,0.05); border-radius:8px; border:1px dashed var(--primary)">
        <p class="small" style="margin-bottom:8px; font-weight:bold">Developer Note (Demo):</p>
        <p class="small">In a real app, an email would be sent. For this demo, click the link below to proceed:</p>
        <a id="tokenLink" href="#" class="small" style="color:var(--primary); word-break: break-all;"></a>
    </div>
  </div>

  <script>
    function showStatus(msg, isError = false) {
      const successEl = document.getElementById('statusMessage');
      const errorEl = document.getElementById('errorMessage');
      
      successEl.style.display = 'none';
      errorEl.style.display = 'none';

      if (isError) {
        errorEl.textContent = msg;
        errorEl.style.display = 'block';
      } else {
        successEl.textContent = msg;
        successEl.style.display = 'block';
      }
    }

    document.getElementById('resetBtn').addEventListener('click', async () => {
      const email = document.getElementById('email').value.trim();
      if (!email) { showStatus('Please enter your email.', true); return; }

      const btn = document.getElementById('resetBtn');
      btn.disabled = true;
      btn.textContent = 'Processing...';

      try {
        const res = await fetch('/api/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await res.json();

        if (!res.ok) throw new Error(data.error || 'Failed to request reset');

        showStatus(data.message || 'Reset email sent successfully!');
        
        // Demo helper: show the link since we don't have an email server
        if (data.resetLink) {
            const demoDiv = document.getElementById('demoLink');
            const tokenLink = document.getElementById('tokenLink');
            tokenLink.href = data.resetLink;
            tokenLink.textContent = window.location.origin + data.resetLink;
            demoDiv.style.display = 'block';
        }

      } catch (err) {
        showStatus(err.message, true);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Send Reset Link';
      }
    });
  </script>
</body>
</html>
